# Supabase local dev config
# Pro napojení na cloud projekt: npx supabase link --project-ref <YOUR_PROJECT_REF>

[project]
id = "greenbett"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = [
  "http://localhost:3000/**",
  "https://*.vercel.app/**"
]

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
